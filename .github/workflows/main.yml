name: Sync Upstream Without Workflow Files

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repo
      - name: Checkout current repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Add upstream remote and fetch
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/official-stockfish/fishtest.git
          git fetch upstream

      # Configure git user
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Create the sync branch and merge
      - name: Create sync branch
        id: sync_branch
        run: |
          BRANCH="sync-fishtest-$(date +'%Y%m%d%H%M%S')"
          git checkout -b $BRANCH
          git merge upstream/master --allow-unrelated-histories -X theirs --no-commit || true
          # Remove workflow changes BEFORE commit/push
          git restore --source=HEAD --staged --worktree .github/workflows/
          if ! git diff --cached --quiet || ! git diff --quiet; then
            git add -A
            git commit -m "fix: sync upstream without workflow-file changes"
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      # Check for changes
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet HEAD origin/${{ github.event.repository.default_branch }}; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Push branch using GITHUB_TOKEN
      - name: Push branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git push origin ${{ steps.sync_branch.outputs.branch }}

      # Create pull request for review and merging
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.sync_branch.outputs.branch }}
          base: ${{ github.event.repository.default_branch }}
          title: "Sync upstream Stockfish (excluding workflow files)"
          body: |
            Automated upstream changes from https://github.com/official-stockfish/fishtest
            (workflow files were excluded from sync to avoid permissions issues)
          commit-message: "Sync upstream Stockfish (excluding workflow files)"
